<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - MBikes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
html{ scroll-behavior:smooth; }
body{ background:rgb(255, 255, 255); padding-top: 100px; }

header{
position:fixed; 
top: 0;
left: 0;
width:100%;
padding:15px 60px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
background:rgba(0, 0, 0, 0.219);
backdrop-filter: blur(5px);
}

.logo{ color:white; font-size:34px; text-decoration:none; }
nav{ display:flex; gap:40px; align-items:center; }
nav a{ color:white; text-decoration:none; font-size:24px; }
.login-btn{ border:3px solid white; padding:0 20px; }
.lang-btn{ padding: 1%; color:white; cursor:pointer; }

.cart-container {
    max-width: 800px;
    margin: 50px auto;
    padding: 0 20px;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    margin-bottom: 10px;
}

.item-name { font-size: 24px; font-weight: 700; }
.item-details { color: #666; }
.item-price { font-size: 24px; font-weight: 700; }

.remove-btn {
    background: #ca1e1e;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    font-weight: 700;
}

.total-box {
    margin-top: 30px;
    text-align: right;
    font-size: 32px;
    font-weight: 700;
}

.empty-text {
    font-size: 24px;
    color: #ccc;
    text-align: center;
    margin-top: 100px;
}


</style>
</head>

<body>

<header>
<a class="logo" href="index.html">MBikes</a>
<nav>
<a href="index.html" data-en="Shop" data-ru="Магазин">Shop</a>
<a class="login-btn" data-en="Login" data-ru="Войти" href="login.html">Login</a>
<span class="lang-btn" onclick="toggleLang()" data-en="RU" data-ru="EN">EN</span>
</nav>
</header>

<div class="cart-container">
    
    <div id="cart-items-list"></div>

    <div id="cart-footer" style="display: none;">
        <div class="total-box">
            <span data-en="Total: " data-ru="Итого: ">Total: </span>
            <span id="total-price">0$</span>
        </div>
        <button onclick="clearAll()" style="padding:0px 15px; font-size:18px; border:3px solid black; background:transparent; cursor:pointer; " data-en="Clear" data-ru="Очистить"></button>
    </div>
</div>

<script>
let currentLang = localStorage.getItem("lang") || "en";

function applyLang() {
    document.querySelectorAll("[data-en]").forEach(el => {
        el.textContent = el.getAttribute("data-" + currentLang);
    });
}

function toggleLang() {
    currentLang = currentLang === "en" ? "ru" : "en";
    localStorage.setItem("lang", currentLang);
    applyLang();
}

applyLang();

let cart = JSON.parse(localStorage.getItem('my_cart')) || [];
const listElement = document.getElementById('cart-items-list');
const footer = document.getElementById('cart-footer');
const totalElement = document.getElementById('total-price');

function displayCart() {
    listElement.innerHTML = '';
    let total = 0;

    if (cart.length === 0) {
        listElement.innerHTML = '<div class="empty-text" data-en="Empty" data-ru="Пусто">Empty</div>';
        footer.style.display = 'none';
        return;
    }

    footer.style.display = 'block';

    cart.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'cart-item';
        row.innerHTML = `
            <div>
                <div class="item-name">${item.name}</div>
                <div class="item-details">${item.size ? '' + item.size : ''}</div>
            </div>
            <div style="display:flex; align-items:center; gap:20px;">
                <div class="item-price">${item.price}$</div>
                <button class="remove-btn" onclick="removeItem(${index})">✕</button>
            </div>
        `;
        listElement.appendChild(row);
        total += parseInt(item.price);
    });

    totalElement.textContent = total + '$';
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem('my_cart', JSON.stringify(cart));
    displayCart();
}

function clearAll() {
    localStorage.removeItem('my_cart');
    cart = [];
    displayCart();
}

displayCart();
</script>

</body>
</html>
