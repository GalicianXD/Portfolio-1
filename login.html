<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color:#f5f5f7;
    position:relative;
}

body::before{
    opacity: 0.6;
    z-index: -1;
    content:"";
    position:absolute;
    inset:0;

    background-image: url(bike.svg);
    background-repeat: repeat;

    background-size: 80px 80px;
    background-position: center;

    pointer-events:none;
}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:15px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:100;
    background:rgba(0,0,0,0.219);
    backdrop-filter: blur(5px);
}

.logo{ color:white; font-size:34px; text-decoration:none; }
nav{ display:flex; gap:40px; align-items:center; }
nav a{ color:white; text-decoration:none; font-size:24px; }
.login-btn{ border:3px solid white; padding:0 20px; }
.lang-btn{ padding: 1%; color:white; cursor:pointer; }

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    text-align:center;
}

h2{
    margin-bottom:20px;
    font-weight:600;
}

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

label{
    font-size:14px;
    text-align:left;
    color:#555;
}

input{
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
    transition:0.2s;
}

input:focus{
    border-color:black;
}

button{
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    opacity:0.9;
}

.register{
    margin-top:15px;
    font-size:14px;
}

.register a{
    text-decoration:none;
    font-weight:600;
    color:black;
}

</style>
</head>

<body>

<header>
  <a class="logo" href="index.html">MBikes</a>
  <nav>
    <a href="#section-two" data-en="More" data-ru="Подробнее">More</a>
    <a href="#section-three" data-en="Buy" data-ru="Купить">Buy</a>
    <a href="#section-three" data-en="Bikes" data-ru="Велосипеды">Bikes</a>
    <span class="lang-btn" onclick="toggleLang()" data-en="RU" data-ru="EN">EN</span>
  </nav>
</header>

<div class="container">
    <h2 data-en="Welcome" data-ru="Добро пожаловать">Welcome</h2>

    <form>
        <label data-en="Login" data-ru="Логин">Login</label>
        <input type="text" required>

        <label data-en="Password" data-ru="Пароль">Password</label>
        <input type="password"required>

        <button type="submit" data-en="Join" data-ru="Войти">Join</button>
    </form>

    <p class="register">
        <span data-en="No account?" data-ru="Нет аккаунта?">No account?</span>
        <a href="" data-en="Sign up" data-ru="Зарегистрироваться">Sign up</a>
    </p>
</div>

</body>
</html>

<script>
let currentLang = localStorage.getItem("lang") || "en";

function applyLang() {
    document.querySelectorAll("[data-en]").forEach(el => {
        el.textContent = el.getAttribute("data-" + currentLang);
    });
}

function toggleLang() {
    currentLang = currentLang === "en" ? "ru" : "en";
    localStorage.setItem("lang", currentLang);
    applyLang();
}

applyLang();
</script>
