<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTB 213 Orange</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
html{ scroll-behavior:smooth; }
body{ background:#fbf9fa }

header{
position:fixed;
top: 0;
left: 0;
width:100%;
padding:15px 60px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
background:rgba(0, 0, 0, 0.219);
backdrop-filter: blur(5px);
}

.logo{ color:white; font-size:34px; text-decoration:none; }
nav{ display:flex; gap:40px; align-items:center; }
nav a{ color:white; text-decoration:none; font-size:24px; }
.login-btn{ border:3px solid white; padding:0 20px; }
.lang-btn{ padding: 1%; color:white; cursor:pointer; }


.header-cart {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    cursor: pointer;
}
.header-cart img {
    width: 28px;
    height: 28px;
}
#cart-count {
    background: #00000070;
    color: white;
    font-size: 16px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 50%;
    min-width: 24px;
    text-align: center;
}

.product {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 80px;
  padding: 140px 20px 60px 20px;
  max-width: 1200px;
  margin: auto;
  flex-wrap: wrap;
}

.product img {
  width: 630px;
  max-width: 100%;
  border-radius: 12px;
}

.info {
  max-width: 450px;
}

.title {
  font-size: 40px;
  font-weight: 900;
  margin-bottom: 10px;
}

.price {
  font-size: 36px;
  font-weight: 900;
  margin-bottom: 8px;
  color: #2b2b2b;
}

.month {
  font-size: 18px;
  margin-bottom: 20px;
  color: #555;
}

.stars {
  font-size: 24px;
  margin-bottom: 20px;
  color: #f4c150;
}

.desc {
  font-size: 16px;
  line-height: 1.6;
  margin-bottom: 25px;
  color: #333;
}

.size-title {
  font-size: 20px;
  margin-bottom: 10px;
  font-weight: 600;
}

.size-select {
  width: 100%;
  padding: 12px 16px;
  font-size: 16px;
  border: 2px solid #111;
  border-radius: 8px;
  margin-bottom: 30px;
  cursor: pointer;
  transition: 0.2s;
}

.size-select:hover {
  border-color: #555;
}

.addtocart-btn {
  position: relative; 
  bottom: auto;
  left: auto;
  transform: none;
  
  width: 30%; 
  height: 60px;
  
  background: black;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 10px;
  
  font-size: 14px;
  font-weight: 530;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: 0.2s;
}
.addtocart-btn:hover {
  background: #222;
}

.cart-icon {
  width: 24px;
  height: 24px;
  fill: white;
}
</style>
</head>

<body>

<header>

  <a class="logo" href="index.html">MBikes</a>

<nav>

<a href="#section-two" class="nav-item" data-en="More" data-ru="Подробнее">More</a>

<a href="#section-three" class="nav-item" data-en="Buy" data-ru="Купить">Buy</a>

<a href="#section-three" class="nav-item" data-en="Bikes" data-ru="Велосипеды">Bikes</a>

<a class="login-btn" data-en="Login" data-ru="Войти" href="login.html">Login</a>

<div class="header-cart" onclick="cartpage()">
    <img src="cart.svg" alt="Cart">
    <span id="cart-count">0</span>
</div>

<span class="lang-btn" onclick="toggleLang()" data-en="RU"
data-ru="EN">EN</span>

</nav>
</header>

<div class="product">
  <img src="BikeProperties.png" alt="MTB 213 Green">

  <div class="info">
    <div class="title">MTB 213 Green</div>
    <div class="price">199$</div>
    <div class="month">16$ for 12 month</div>
    <div class="stars">★ ★ ★ ★ ☆</div>
    <div class="desc" data-en="Mountain bike designed for active riding on both rugged trails and city streets.
      This model combines a sturdy construction, comfort and a stylish design." data-ru="Горный велосипед, предназначенный для активного катания как по пересеченной местности, так и по городским улицам.
Эта модель сочетает в себе прочную конструкцию, комфорт и стильный дизайн.">
    </div>

    <div class="size-title" data-en="Choose size (height)" data-ru="Выберите размер (под рост)" >Choose size (height):</div>
    <select class="size-select">
      <option selected disabled></option>
      <option>150 – 165 cm</option>
      <option>165 – 175 cm</option>
      <option>175 – 185 cm</option>
      <option>185+ cm</option>
    </select>

            <button class="addtocart-btn js-add" data-name="MTB GREEN" data-price="199" data-height="${size}">
                <img src="cart.svg" class="cart-icon">
                <p data-en="add to cart" data-ru="в корзину">add to cart</p>
            </button>
<script>
let cart = JSON.parse(localStorage.getItem('my_cart')) || [];
const cartCountElement = document.getElementById('cart-count');
const sizeSelect = document.querySelector(".size-select");
const addBtn = document.querySelector(".js-add");

function updateCount() {
    if (cartCountElement) {
        cartCountElement.textContent = cart.length;
    }
}
updateCount();

addBtn.onclick = (e) => {
    e.preventDefault();

    const selectedSize = sizeSelect.value;

const messages = {
    en: "Please select your height first!",
    ru: "Пожалуйста, выберите рост!"
};

if (!selectedSize || selectedSize === "") {
    alert(messages[currentLang]);
    return;
}
    const item = {
        name: addBtn.getAttribute('data-image'),
        name: addBtn.getAttribute('data-name'),
        price: addBtn.getAttribute('data-price'),
        size: selectedSize
    };

    cart.push(item);
    localStorage.setItem('my_cart', JSON.stringify(cart));
    
    updateCount();

    addBtn.style.background = "#00ff66";
    addBtn.style.transform = "scale(0.95)";
    
    setTimeout(() => { 
        addBtn.style.background = "black";
        addBtn.style.transform = "scale(1)";
    }, 300);
};

let currentLang = localStorage.getItem("lang") || "en";

function applyLang() {
    document.querySelectorAll("[data-en]").forEach(el => {
        el.textContent = el.getAttribute("data-" + currentLang);
    });
}

function toggleLang() {
    currentLang = currentLang === "en" ? "ru" : "en";
    localStorage.setItem("lang", currentLang);
    applyLang();
}

applyLang();

function cartpage() {
    window.location.href = 'cart.html';
}

</script>

</body>
</html>
